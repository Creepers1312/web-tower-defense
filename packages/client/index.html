<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Defense — Nallons</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        /* "safe" keeps things centred when they fit, but falls back to start-
           alignment (and lets the page scroll) instead of clipping the board
           off-screen when the window is too short. */
        align-items: safe center;
        justify-content: safe center;
        background: #0f172a;
        color: #e2e8f0;
      }
      #game {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 220px;
        /* board row flexes; footer + hint size to content (no header) */
        grid-template-rows: minmax(0, 1fr) auto auto;
        gap: 10px;
        padding: 12px;
        box-sizing: border-box;
        width: min(100vw, 1400px);
        height: 100vh;
      }
      #topbar {
        grid-column: 1 / 3;
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 14px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 8px 14px;
      }
      #topbar .stat b {
        color: #f8fafc;
      }
      #topbar .spacer {
        flex: 1;
      }
      #app {
        border: 1px solid #334155;
        border-radius: 8px;
        overflow: hidden;
        line-height: 0;
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* The renderer sizes the canvas to fill this cell (see PixiRenderer.fit);
         these caps just guard against any transient overflow. */
      #app canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      #sidebar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        /* Stretch to the full board height (removed align-self:start). */
      }
      /* Tower shop grows to fill the sidebar so it runs the full length; the
         wave controls stay pinned at the bottom (reference-style). */
      #sidebar > .panel:first-child {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #sidebar #palette {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .panel {
        position: relative;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
      }
      /* Riveted panel corners (the "dots" in each corner, as on the reference). */
      .panel::after {
        content: "";
        position: absolute;
        inset: 4px;
        pointer-events: none;
        border-radius: 6px;
        background-repeat: no-repeat;
        background-image:
          radial-gradient(circle at top left, #94a3b8 0 2px, transparent 2.6px),
          radial-gradient(circle at top right, #94a3b8 0 2px, transparent 2.6px),
          radial-gradient(circle at bottom left, #94a3b8 0 2px, transparent 2.6px),
          radial-gradient(circle at bottom right, #94a3b8 0 2px, transparent 2.6px);
      }
      .panel h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin: 0 0 8px;
      }
      button {
        font: inherit;
        color: #e2e8f0;
        background: #334155;
        border: 1px solid #475569;
        border-radius: 6px;
        padding: 7px 10px;
        cursor: pointer;
        width: 100%;
        text-align: left;
      }
      button:hover:not(:disabled) {
        background: #3f4d63;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.active {
        outline: 2px solid #38bdf8;
      }
      button.primary {
        background: #2563eb;
        border-color: #3b82f6;
        text-align: center;
      }
      button.danger {
        background: #7f1d1d;
        border-color: #b91c1c;
        text-align: center;
      }
      .row {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .muted {
        color: #94a3b8;
      }
      #hint {
        grid-column: 1 / 3;
        font-size: 12px;
        color: #94a3b8;
        min-height: 16px;
      }
      .hud-icon {
        width: 18px;
        height: 18px;
        image-rendering: pixelated;
        vertical-align: middle;
      }
      #palette button {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #palette .hud-icon {
        width: 24px;
        height: 24px;
      }

      /* Wave controls in the sidebar (start + fast-forward), reference-style. */
      #waveControls {
        display: flex;
        gap: 8px;
        align-items: stretch;
        margin-top: 10px;
      }
      #waveControls .go-btn {
        flex: 1;
        text-align: center;
        font-weight: 700;
        background: #16a34a;
        border-color: #22c55e;
        color: #f0fdf4;
        font-size: 16px;
        padding: 10px;
      }
      #waveControls .go-btn:hover:not(:disabled) {
        background: #15803d;
      }
      #waveControls .ff-btn {
        width: auto;
        text-align: center;
        min-width: 54px;
        font-weight: 700;
      }

      /* --- Persistent bottom bar (fixed height; only the centre swaps) --- */
      #footer {
        grid-column: 1 / 3;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 72px;
      }
      #footer button {
        width: auto;
        text-align: center;
      }
      .footer-body {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 56px;
        overflow: visible; /* let upgrade tooltips escape upward */
      }
      .footer-util {
        display: flex;
        gap: 8px;
        align-self: center;
      }
      /* Empty "Special Agents" placeholder slots for the default footer view. */
      .agent-slots {
        display: flex;
        gap: 6px;
      }
      .agent-slots .slot {
        width: 44px;
        height: 44px;
        border: 1px dashed #475569;
        border-radius: 8px;
        background: #0f172a;
      }
      #footer .fsec {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #footer .fportrait {
        min-width: 132px;
      }
      #footer .fportrait img {
        width: 36px;
        height: 36px;
        image-rendering: pixelated;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 2px;
      }
      #footer #selName {
        font-weight: 600;
        color: #f8fafc;
      }
      #footer #selStats {
        font-size: 12px;
      }
      #footer .fdivider {
        align-self: stretch;
        width: 1px;
        background: #334155;
      }
      #footer .flabel {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #94a3b8;
      }
      /* Segmented targeting control */
      .seg {
        display: inline-flex;
        border: 1px solid #475569;
        border-radius: 6px;
        overflow: hidden;
      }
      .seg button {
        width: auto;
        border: none;
        border-right: 1px solid #475569;
        border-radius: 0;
        padding: 5px 8px;
        font-size: 12px;
      }
      .seg button:last-child {
        border-right: none;
      }
      .seg button.active {
        background: #2563eb;
        outline: none;
      }
      /* Compact upgrade-path icon tiles with a hover tooltip. */
      .up-tile {
        position: relative;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        width: auto;
      }
      .up-tile .up-pips {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .up-tile .up-pips i {
        display: block;
        width: 14px;
        height: 4px;
        border-radius: 2px;
        background: #475569;
      }
      .up-tile .up-pips i.on {
        background: #22c55e;
      }
      .up-tile .up-ic {
        width: 26px;
        height: 26px;
        image-rendering: pixelated;
      }
      .up-tile .up-cost {
        font-weight: 600;
        font-size: 12px;
        min-width: 34px;
        text-align: left;
      }
      .up-tile.locked,
      .up-tile.maxed {
        opacity: 0.6;
      }
      /* Tooltip: hidden until hover, floats above the tile (footer is at bottom). */
      .up-tile .up-tip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        display: none;
        z-index: 20;
        width: max-content;
        max-width: 220px;
        white-space: normal;
        text-align: left;
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 6px;
        padding: 7px 9px;
        font-size: 12px;
        line-height: 1.3;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }
      .up-tile:hover .up-tip {
        display: block;
      }
      .up-tile .up-tip b {
        color: #f8fafc;
      }
      .up-tile .up-tip .up-tip-cost {
        color: #fde047;
      }

      /* Sidebar money/lives (moved out of the removed header) + round line. */
      #sideStats {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 15px;
      }
      #sideStats .stat b {
        color: #f8fafc;
      }
      #roundInfo {
        font-size: 12px;
        margin: 6px 0 4px;
      }
      /* Muted audio toggles are dimmed. */
      .footer-util button.muted {
        opacity: 0.55;
      }

      /* Start menu / game-over overlays. */
      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.93);
        z-index: 100;
      }
      .menu-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 26px 34px;
        min-width: 320px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }
      .menu-card h1 {
        margin: 0 0 16px;
        color: #f8fafc;
      }
      .menu-section {
        margin: 14px 0;
      }
      .menu-label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin-bottom: 8px;
      }
      .menu-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .menu-row button {
        width: auto;
        text-align: center;
      }
      .menu-row button.active {
        outline: 2px solid #38bdf8;
        background: #2563eb;
      }
      .menu-play {
        width: 100%;
        margin-top: 18px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div id="app"></div>

      <div id="sidebar">
        <div class="panel" id="towerPanel">
          <div id="sideStats">
            <span class="stat">💰 <b id="money">0</b></span>
            <span class="stat"><img class="hud-icon" src="/sprites/heart.png" alt="lives" /> <b id="lives">0</b></span>
          </div>
          <div id="roundInfo" class="muted">Round <b id="wave">0</b> · <b id="phase">—</b></div>
          <h2>Towers</h2>
          <div id="palette"></div>
          <div id="waveControls">
            <button id="startWave" class="go-btn">GO! ▶</button>
            <button id="speedBtn" class="ff-btn" title="Game speed">1×</button>
          </div>
        </div>
      </div>

      <!-- Footer stays a fixed height; only its centre content swaps between the
           default (agents) view and the selected-tower view, so nothing shifts. -->
      <div class="panel" id="footer">
        <!-- Default view: shown when no tower is selected. -->
        <div id="footerDefault" class="footer-body">
          <span class="flabel">Special Agents</span>
          <div class="agent-slots">
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
            <div class="slot"></div>
          </div>
        </div>

        <!-- Selected-tower view: shown when a tower is selected. -->
        <div id="footerSelected" class="footer-body" style="display:none">
          <div class="fsec fportrait">
            <img id="selIcon" src="" alt="" />
            <div>
              <div id="selName">—</div>
              <div id="selStats" class="muted">—</div>
            </div>
          </div>
          <div class="fdivider"></div>
          <div class="fsec">
            <span class="flabel">Target</span>
            <div class="seg" id="targeting">
              <button data-mode="first">First</button>
              <button data-mode="last">Last</button>
              <button data-mode="close">Close</button>
              <button data-mode="strong">Strong</button>
            </div>
          </div>
          <div class="fdivider"></div>
          <button id="sell" class="danger">Sell</button>
          <button id="up0" class="up-tile"></button>
          <button id="up1" class="up-tile"></button>
          <button id="ability" class="primary" style="display:none"></button>
        </div>

        <!-- Persistent utility cluster (the "home" corner): always visible. -->
        <div class="footer-util">
          <button id="musicMute" title="Toggle music">🎵</button>
          <button id="sfxMute" title="Toggle sound effects">🔊</button>
          <button id="pauseBtn">⏸ Pause</button>
          <button id="autoBtn">Auto: off</button>
        </div>
      </div>

      <div id="hint"></div>
    </div>

    <!-- Start menu: difficulty + map selection, shown before the game starts. -->
    <div id="startMenu" class="overlay">
      <div class="menu-card">
        <h1>Nallon Defense</h1>
        <div class="menu-section">
          <div class="menu-label">Difficulty</div>
          <div class="menu-row" id="difficultyRow">
            <button data-diff="easy" class="active">Easy</button>
            <button data-diff="medium">Medium</button>
            <button data-diff="hard">Hard</button>
          </div>
        </div>
        <div class="menu-section">
          <div class="menu-label">Map</div>
          <div class="menu-row" id="mapRow"></div>
        </div>
        <button id="playBtn" class="go-btn menu-play">Play ▶</button>
      </div>
    </div>

    <!-- Game-over / victory overlay. -->
    <div id="gameOver" class="overlay" style="display:none">
      <div class="menu-card">
        <h1 id="goTitle">Game Over</h1>
        <div id="goMsg" class="muted"></div>
        <button id="goBtn" class="go-btn menu-play">Back to menu</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
